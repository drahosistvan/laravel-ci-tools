name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  schedule:
    # Run every Monday at 2 AM UTC to rebuild images with latest dependencies
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP version to build (leave empty for all)'
        required: false
        type: string
      node_version:
        description: 'Node version to build (leave empty for all)'
        required: false
        type: string

env:
  DOCKER_REPOSITORY: laravel-ci-tools

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate build matrix
        id: set-matrix
        run: |
          PHP_VERSION="${{ github.event.inputs.php_version }}"
          NODE_VERSION="${{ github.event.inputs.node_version }}"
          
          if [[ -n "$PHP_VERSION" ]] && [[ -n "$NODE_VERSION" ]]; then
            # Manual workflow with specific versions
            echo "matrix={\"include\":[{\"php\":\"$PHP_VERSION\",\"node\":\"$NODE_VERSION\"}]}" >> $GITHUB_OUTPUT
          else
            # Full matrix build
            echo "matrix=$(jq -c . <<'EOF'
          {
            "include": [
              {"php": "8.1", "node": "20"},
              {"php": "8.1", "node": "22"},
              {"php": "8.1", "node": "24"},
              {"php": "8.2", "node": "20"},
              {"php": "8.2", "node": "22"},
              {"php": "8.2", "node": "24"},
              {"php": "8.3", "node": "20"},
              {"php": "8.3", "node": "22"},
              {"php": "8.3", "node": "24"},
              {"php": "8.4", "node": "20"},
              {"php": "8.4", "node": "22"},
              {"php": "8.4", "node": "24"}
            ]
          }
          EOF
          )" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        run: |
          PHP_VERSION=${{ matrix.php }}
          NODE_VERSION=${{ matrix.node }}
          PHP_MAJOR=$(echo $PHP_VERSION | cut -d. -f1)
          
          # Base tag with full version
          TAGS="${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:php${PHP_VERSION}-node${NODE_VERSION}"
          
          # Add additional tags for latest combinations
          # Latest overall (PHP 8.4 + Node 24 - newest versions)
          if [[ "$PHP_VERSION" == "8.4" ]] && [[ "$NODE_VERSION" == "24" ]]; then
            TAGS="${TAGS},${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:latest"
          fi
          
          # Latest for each PHP major version with Node 20
          if [[ "$NODE_VERSION" == "20" ]]; then
            TAGS="${TAGS},${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:php${PHP_MAJOR}"
            TAGS="${TAGS},${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:php${PHP_VERSION}"
          fi
          
          # Latest for each Node major version with PHP 8.3
          if [[ "$PHP_VERSION" == "8.3" ]]; then
            TAGS="${TAGS},${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:node${NODE_VERSION}"
          fi
          
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "php_version=${PHP_VERSION}" >> $GITHUB_OUTPUT
          echo "node_version=${NODE_VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            PHP_VERSION=${{ steps.meta.outputs.php_version }}
            NODE_VERSION=${{ steps.meta.outputs.node_version }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        run: echo "Built and pushed image with tags - ${{ steps.meta.outputs.tags }}"

  update-readme:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_REPOSITORY }}
          readme-filepath: ./README.md
